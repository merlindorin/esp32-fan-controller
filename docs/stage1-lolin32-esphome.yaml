# ESPHome config used on the Stage 1 prototype.
#
# Hardware: ESP32 LoLin32 + 2× DS18B20 waterproof probes on a shared 1-Wire bus
# (GPIO 4, single 4.7 kΩ pull-up to 3V3). Two screw terminals on the protoboard
# split out the probes; both probes share the same 1-Wire bus.
#
# Secrets used: api_encryption_key, ota_password, wifi_ssid, wifi_password,
# fallback_password. Provide them in `secrets.yaml` next to this file (not
# committed). The DS18B20 64-bit addresses below are the IDs of the two probes
# used during prototyping — yours will differ; check the ESPHome logs on first
# boot ("Found device with address: 0x...").

esphome:
  name: lolin32
  friendly_name: Lolin32

esp32:
  board: lolin32
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Lolin32 Fallback"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  version: 2

# 1-Wire bus shared by both DS18B20 sensors
one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

  - platform: dallas_temp
    name: "Temperature 1"
    address: 0x72000000be310828
    update_interval: 30s

  - platform: dallas_temp
    name: "Temperature 2"
    address: 0x27000000bf5ac728
    update_interval: 30s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

binary_sensor:
  - platform: status
    name: "Status"

button:
  - platform: restart
    name: "Restart"
